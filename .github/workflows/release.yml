name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      crate_name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
      published: ${{ steps.crates.outputs.published }}
      release_exists: ${{ steps.release.outputs.exists }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Read package metadata
        id: meta
        run: |
          cargo metadata --format-version 1 --no-deps > metadata.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          with open("metadata.json", "r", encoding="utf-8") as handle:
              package = json.load(handle)["packages"][0]

          print(f"name={package['name']}")
          print(f"version={package['version']}")
          PY
          rm metadata.json

      - name: Check crates.io for current version
        id: crates
        env:
          CRATE_NAME: ${{ steps.meta.outputs.name }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.error
          import urllib.request

          crate_name = os.environ["CRATE_NAME"]
          version = os.environ["VERSION"]
          url = f"https://crates.io/api/v1/crates/{crate_name}"

          published = False
          try:
              with urllib.request.urlopen(url) as response:
                  data = json.load(response)
              published = any(item["num"] == version for item in data.get("versions", []))
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          print(f"published={'true' if published else 'false'}")
          PY

      - name: Check if GitHub release already exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    needs: prepare
    if: ${{ needs.prepare.outputs.release_exists != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          archive="git-hunk-${TARGET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "dist/${archive}" git-hunk
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  publish:
    needs: prepare
    if: ${{ needs.prepare.outputs.published != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Require crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is required to publish a new crate version." >&2
            exit 1
          fi

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

  release:
    needs:
      - prepare
      - build-binaries
      - publish
    if: ${{ needs.prepare.outputs.release_exists != 'true' && (needs.publish.result == 'success' || needs.publish.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            dist/*
